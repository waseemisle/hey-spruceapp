name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        run: |
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=shureprint \
            --yes \
            -A vercel-staging.json
        env:
          VERCEL_ORG_ID: team_cNrWOjgjfzyffP60J2Dh5xPf
          VERCEL_PROJECT_ID: prj_oGjCaeRQGUfuZLR7LVxPCxCQaA3D
